name: Deploy Production to GitHub Pages

on:
  push:
    tags:
      - "v*"

concurrency:
  group: pages-prod
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-prod:
    name: Build & deploy production (tag)
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout tag
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22.12.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Safety check
      - name: Assert build output exists
        run: test -f dist/index.html

      - name: Prepare production site
        run: |
          rm -rf pages-site
          mkdir -p pages-site
          cp -R dist/. pages-site/
          touch pages-site/.nojekyll

      - name: Checkout main for preview
        uses: actions/checkout@v5
        with:
          ref: main
          path: preview-source
          fetch-depth: 1

      - name: Install preview dependencies
        working-directory: preview-source
        run: npm ci

      - name: Build preview
        working-directory: preview-source
        run: npm run build

      - name: Add preview site
        run: |
          mkdir -p pages-site/preview
          cp -R preview-source/dist/. pages-site/preview/

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: pages-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
